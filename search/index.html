function doSearch(q) {
  var grid = document.getElementById('results-grid');
  var header = document.getElementById('results-header');
  var empty = document.getElementById('empty-state');
  var input = document.getElementById('search-input');
  if (q) input.value = q;
  var ql = (q || '').toLowerCase().trim();
  var results = ql ? PRODUCTS.filter(function(p) {
    return p.name.toLowerCase().includes(ql) ||
           (p.nameEn || '').toLowerCase().includes(ql) ||
           (p.description || '').toLowerCase().includes(ql) ||
           (p.category || '').toLowerCase().includes(ql);
  }) : PRODUCTS;

  if (results.length === 0) {
    grid.innerHTML = '';
    header.innerHTML = '';
    empty.classList.remove('hidden');
    return;
  }
  empty.classList.add('hidden');
  header.innerHTML = ql
    ? '找到 <strong class="text-green-700">' + results.length + '</strong> 件「' + q + '」相關風箏 &nbsp;<a href="/search" class="text-sm text-gray-400 underline hover:text-green-600">清除搜尋</a>'
    : '顯示全部 <strong class="text-green-700">' + results.length + '</strong> 件產品';

  grid.innerHTML = results.map(function(p) {
    return '<a href="/products/' + p.id + '" class="block bg-white rounded-xl shadow-md hover:shadow-xl transition-all transform hover:-translate-y-1 overflow-hidden border border-gray-100">' +
      '<div class="aspect-square bg-green-50 flex items-center justify-center text-7xl">🪁</div>' +
      '<div class="p-4">' +
        '<h3 class="font-semibold text-gray-800 mb-1 line-clamp-2">' + p.name + '</h3>' +
        '<p class="text-xs text-gray-400 mb-2">' + p.nameEn + '</p>' +
        '<div class="flex items-center justify-between mt-3">' +
          '<span class="text-lg font-bold text-blue-600">HK$' + p.price + '</span>' +
          '<span class="text-sm text-green-600">查看詳情 →</span>' +
        '</div>' +
      '</div>' +
    '</a>';
  }).join('');
}

// Read query from URL
var params = new URLSearchParams(window.location.search);
var q = params.get('q') || '';
doSearch(q);

// Handle form submit
document.getElementById('search-form').addEventListener('submit', function(e) {
  e.preventDefault();
  var q = document.getElementById('search-input').value.trim();
  if (q) {
    history.pushState({}, '', '/search?q=' + encodeURIComponent(q));
    doSearch(q);
  }
});
</script>
