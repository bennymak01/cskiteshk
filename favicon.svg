<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Colorful kite diamond shape divided into 4 quadrants -->
  <!-- Top quadrant: red -->
  <polygon points="50,5 50,50 5,50" fill="#e53e3e"/>
  <!-- Right quadrant: green -->
  <polygon points="50,5 95,50 50,50" fill="#38a169"/>
  <!-- Bottom quadrant: blue -->
  <polygon points="50,95 5,50 50,50" fill="#3182ce"/>
  <!-- Left quadrant: orange/yellow -->
  <polygon points="50,95 95,50 50,50" fill="#dd6b20"/>
  <!-- White cross lines -->
  <line x1="5" y1="50" x2="95" y2="50" stroke="white" stroke-width="2.5"/>
  <line x1="50" y1="5" x2="50" y2="95" stroke="white" stroke-width="2.5"/>
  <!-- Outline -->
  <polygon points="50,5 95,50 50,95 5,50" fill="none" stroke="white" stroke-width="2"/>
</svg>
