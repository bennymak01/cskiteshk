name: Update Sitemap

on:
  schedule:
    # 每週一上午 02:00 UTC (即香港時間 10:00 AM) 執行
    # 在部落格文章自動發佈 (09:00 AM) 後一小時執行，確保 Sitemap 包含新文章
    - cron: '0 2 * * 1'
  push:
    branches:
      - main
  workflow_dispatch: # 允許從 GitHub UI 手動觸發

jobs:
  update-sitemap:
    runs-on: ubuntu-latest
    permissions:
      contents: write # 需要推送權限以更新 sitemap.xml

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Generate sitemap
        run: node generate-sitemap.js

      - name: Commit and push if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add sitemap.xml
          if git diff --staged --quiet; then
            echo "No changes to sitemap.xml — skipping commit."
          else
            git commit -m "chore: update sitemap.xml [$(date +%Y-%m-%d)]"
            git push
          fi
