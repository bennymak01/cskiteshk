name: Auto Publish Drafts

on:
  schedule:
    # Every Friday at 01:00 UTC (09:00 HKT)
    # 0 1 * * 5
    - cron: '0 1 * * 5'
  workflow_dispatch: # Allow manual trigger

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check Date and Publish
        run: |
          CURRENT_DATE=$(date +%Y-%m-%d)
          START_DATE="2026-05-01"
          END_DATE="2026-06-05"
          
          if [[ "$CURRENT_DATE" < "$START_DATE" || "$CURRENT_DATE" > "$END_DATE" ]]; then
            echo "Current date $CURRENT_DATE is outside the target range ($START_DATE to $END_DATE). Skipping."
            exit 0
          fi
          
          echo "Current date $CURRENT_DATE is within the target range. Checking for drafts to publish..."
          
          # Find drafts that match the current date
          DRAFTS=$(ls _drafts/${CURRENT_DATE}-*.md 2>/dev/null || true)
          
          if [ -z "$DRAFTS" ]; then
            echo "No drafts found for $CURRENT_DATE."
            exit 0
          fi
          
          mkdir -p blog
          for draft in $DRAFTS; do
            filename=$(basename "$draft")
            # Create a directory for the post (matching the site's structure)
            post_dir="blog/${filename%.md}"
            mkdir -p "$post_dir"
            
            # Convert markdown to index.html (simplified for this automation)
            # In a real Jekyll/Astro setup, this would be handled by the build process.
            # Here we move the file to the blog directory as a placeholder or for the build system.
            mv "$draft" "$post_dir/index.md"
            echo "Published $filename to $post_dir/index.md"
          done
          
          # Configure git
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          
          # Commit and push
          git add .
          git commit -m "Auto-publish drafts for $CURRENT_DATE"
          git push
