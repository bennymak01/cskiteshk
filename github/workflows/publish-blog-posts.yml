name: Publish Scheduled Blog Posts

on:
  schedule:
    # 設定在 2026/3/23 至 2026/4/20 期間，每週一上午 01:00 UTC (即香港時間 09:00 AM) 執行
    - cron: '0 1 * * 1'
  workflow_dispatch: # 允許手動觸發測試

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Get current date
        id: date
        run: echo "today=$(date +'%Y-%m-%d')" >> $GITHUB_OUTPUT

      - name: Check for scheduled post
        id: check_post
        run: |
          # 尋找檔名開頭為當天日期的 Markdown 檔案
          POST_FILE=$(ls _drafts/${{ steps.date.outputs.today }}*.md 2>/dev/null || echo "")
          if [ -n "$POST_FILE" ]; then
            echo "found=true" >> $GITHUB_OUTPUT
            echo "post_file=$POST_FILE" >> $GITHUB_OUTPUT
          else
            echo "found=false" >> $GITHUB_OUTPUT
          fi

      - name: Move post to blog directory
        if: steps.check_post.outputs.found == 'true'
        run: |
          FILENAME=$(basename ${{ steps.check_post.outputs.post_file }})
          # 移除日期前綴與副檔名，生成網址路徑 (Slug)
          SLUG=$(echo $FILENAME | sed 's/^[0-9]\{4\}-[0-9]\{2\}-[0-9]\{2\}-//' | sed 's/\.md$//')
          TARGET_DIR="blog/$SLUG"
          mkdir -p $TARGET_DIR
          # 將草稿移至目標資料夾並命名為 index.md
          mv ${{ steps.check_post.outputs.post_file }} $TARGET_DIR/index.md
          echo "Published $FILENAME to $TARGET_DIR"

      - name: Commit and push changes
        if: steps.check_post.outputs.found == 'true'
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          git add .
          git commit -m "Automated publish: ${{ steps.date.outputs.today }}"
          git push
